version: "3.9"

services:

  api:
    build: .
    container_name: ph7loot-backend
    ports:
      - "3000:3000"

    env_file:
      - .env

    depends_on:
      - redis

    volumes:
      - ./src/uploads:/app/src/uploads

    restart: always

  redis:
    image: redis:7-alpine
    container_name: ph7loot-redis
    ports:
      - "6379:6379"

    restart: always